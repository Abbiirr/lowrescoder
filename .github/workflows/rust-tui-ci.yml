name: Rust TUI CI

on:
  push:
    branches: [main]
    paths:
      - 'autocode/rtui/**'
      - '.github/workflows/rust-tui-ci.yml'
  pull_request:
    paths:
      - 'autocode/rtui/**'
      - '.github/workflows/rust-tui-ci.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            autocode/rtui/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('autocode/rtui/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: autocode/rtui
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: autocode/rtui
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: autocode/rtui
        run: cargo test

      - name: Build release
        working-directory: autocode/rtui
        run: cargo build --release

      - name: Check binary size
        working-directory: autocode/rtui
        run: |
          SIZE=$(stat -c%s target/release/autocode-tui)
          echo "Binary size: $((SIZE / 1024 / 1024))MB"
          if [ "$SIZE" -gt 10485760 ]; then
            echo "ERROR: Binary exceeds 10MB limit"
            exit 1
          fi
